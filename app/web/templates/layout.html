<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> 
        {% if title %}
        FastAPI Blog - {{title}}
        {% else %}
        FastAPI Blog
        {% endif %}
    </title>


    <link rel="stylesheet" href="{{ url_for('static', path='css/custom.css') }}">
</head>
<body>
    <nav class="navbar">
        <span class="navbar-title">FastAPI Blog</span>
        <a href="/posts" class="navbar-link">Posts</a>
    </nav>
    <div class="container">
        {% block content %}
        {% endblock content %}
    </div>
</body>

</html>
